<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>状态栏 · 星月女子学院</title>
<style>
:root{
  --bg-0:#fff0f5;--bg-1:#ffe4ec;--bg-card:rgba(255,192,203,.2);
  --c-text:#fff0f5;--c-dim:rgba(255,240,245,.75);--c-border:rgba(255,182,193,.3);
  --c-danger:#ff6b8a;--c-warn:#ff9ec4;--c-orange:#ff85a2;--c-safe:#ffb6d9;--c-accent:#ff69b4;--c-blue:#ff85a2;--c-pink:#ff1493;--c-silver:#ffc0cb;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --fs-xs:clamp(10px,2vw,11px);--fs-sm:clamp(11px,2.2vw,12px);--fs-base:clamp(12px,2.5vw,13px);--fs-md:clamp(13px,2.8vw,15px);
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font);color:var(--c-text);background:transparent;font-size:var(--fs-base);line-height:1.5}
.sb{position:sticky;bottom:0;background:linear-gradient(135deg,rgba(255,240,245,.35),rgba(255,192,203,.25));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--c-border);border-radius:18px;padding:12px 14px;margin:6px 0;box-shadow:0 4px 20px rgba(255,105,180,.15);text-shadow:0 1px 6px rgba(139,58,82,.35)}
.hd{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--c-border);margin-bottom:8px;flex-wrap:wrap}
.hd-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
.hd-t{font-size:var(--fs-md);font-weight:700;color:var(--c-accent);letter-spacing:1px;text-shadow:0 1px 8px rgba(255,105,180,.4)}
.hd-sub{font-size:var(--fs-xs);color:var(--c-dim);width:100%;margin-top:2px}
.pill{font-size:var(--fs-xs);padding:4px 10px;border-radius:14px;background:rgba(255,192,203,.18);border:1px solid rgba(255,182,193,.3);color:var(--c-accent);white-space:nowrap}
.pill.warn{background:rgba(255,158,196,.18);border-color:rgba(255,158,196,.4);color:var(--c-warn)}
.pill.danger{background:rgba(255,107,138,.18);border-color:rgba(255,107,138,.4);color:var(--c-danger)}
.pill.safe{background:rgba(255,182,217,.18);border-color:rgba(255,182,217,.4);color:var(--c-safe)}
.pill.silver{background:rgba(255,192,203,.15);border-color:rgba(255,192,203,.3);color:var(--c-silver)}
.rfr{min-width:44px;min-height:44px;background:rgba(255,192,203,.2);border:1px solid var(--c-border);color:var(--c-accent);border-radius:14px;padding:6px 12px;cursor:pointer;font-size:var(--fs-md);flex-shrink:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:background .2s}
.rfr:hover{color:var(--c-text);background:rgba(255,192,203,.3)}
.rfr.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
details.block{background:rgba(255,192,203,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--c-border);border-radius:16px;padding:0;margin-bottom:8px;overflow:hidden}
details.block>summary{font-size:var(--fs-sm);font-weight:700;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;list-style:none}
details.block>summary::-webkit-details-marker{display:none}
details.block[open]>summary{border-bottom:1px solid var(--c-border)}
details.block[open]>summary .caret{transform:rotate(90deg)}
details.block>summary .caret{margin-left:auto;transition:transform .2s}
.card-t.player{color:var(--c-safe)}
.card-t.heroine{color:var(--c-accent)}
.card-t.skill{color:#ffb6c1}
.card-t.academic{color:var(--c-blue)}
.card-t.symptom{color:var(--c-pink)}
.card-t.hidden{color:var(--c-dim)}
.card-t.list{color:var(--c-accent)}
.card-t.event{color:var(--c-silver)}
.block-body{padding:8px 12px 10px;display:block}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px}
.kv{display:flex;flex-direction:column;gap:1px}
.kv .k{font-size:var(--fs-xs);color:var(--c-dim)}
.kv .v{font-size:var(--fs-sm);font-weight:600}
.v.danger{color:var(--c-danger)}.v.warn{color:var(--c-warn)}.v.safe{color:var(--c-safe)}.v.neutral{color:var(--c-dim)}.v.accent{color:var(--c-accent)}.v.blue{color:var(--c-blue)}.v.pink{color:var(--c-pink)}.v.silver{color:var(--c-silver)}
.bar{margin:4px 0}
.bar-h{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--c-dim);margin-bottom:2px}
.bar-h .bv{color:var(--c-text);font-weight:600}
.bar-t{height:8px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden}
.bar-f{height:100%;border-radius:6px;transition:width .5s ease;width:0}
.bar-f.r{background:linear-gradient(90deg,#ff6b8a,#ff1493)}
.bar-f.o{background:linear-gradient(90deg,#ff85a2,#ff69b4)}
.bar-f.y{background:linear-gradient(90deg,#ffb6c1,#ff85a2)}
.bar-f.g{background:linear-gradient(90deg,#ffb6d9,#ff69b4)}
.bar-f.b{background:linear-gradient(90deg,#ffc0cb,#ff85a2)}
.bar-f.p{background:linear-gradient(90deg,#ff1493,#ff69b4)}
.sect-title{font-size:var(--fs-xs);color:var(--c-dim);margin:8px 0 4px;font-weight:600;border-bottom:1px solid rgba(255,182,193,.2);padding-bottom:3px}
.heroine-item{background:rgba(255,192,203,.1);border:1px solid rgba(255,182,193,.25);border-radius:12px;padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:background .2s}
.heroine-item:hover{background:rgba(255,192,203,.18)}
.heroine-item.active{border-color:rgba(255,105,180,.5);background:rgba(255,192,203,.2)}
.heroine-row{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.heroine-name{font-weight:700;font-size:var(--fs-sm);color:var(--c-accent)}
.heroine-role{font-size:var(--fs-xs);color:var(--c-dim)}
.heroine-stats{display:flex;gap:4px;margin-top:2px;font-size:var(--fs-xs);color:var(--c-dim);flex-wrap:wrap}
.shop-item{cursor:pointer;transition:background .15s}
.shop-item.buyable:hover{background:rgba(255,192,203,.2)}
.shop-item.disabled{opacity:.5;cursor:not-allowed}
.shop-status{font-size:var(--fs-xs);padding:3px 10px;border-radius:10px;text-align:right;margin-top:3px}
.shop-status.buyable{color:var(--c-safe)}
.shop-status.disabled{color:var(--c-danger)}
.loading{text-align:center;padding:30px;color:var(--c-dim);font-size:var(--fs-md);animation:pulse 1.2s ease infinite;text-shadow:0 1px 6px rgba(139,58,82,.35)}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,182,193,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:9999;display:none;align-items:center;justify-content:center;padding:10px}
.modal-overlay.show{display:flex}
.modal{background:linear-gradient(135deg,#fff0f5,#ffe4ec);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--c-border);border-radius:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;padding:14px;box-shadow:0 8px 32px rgba(255,105,180,.25);text-shadow:0 1px 6px rgba(139,58,82,.35)}
.modal-title{font-size:var(--fs-md);font-weight:700;margin-bottom:10px;color:var(--c-accent);display:flex;justify-content:space-between;align-items:center}
.modal-close{min-width:44px;min-height:44px;background:rgba(255,192,203,.25);border:1px solid var(--c-border);color:var(--c-accent);border-radius:12px;padding:4px 10px;cursor:pointer;font-size:var(--fs-md)}
.nsfw-tag{font-size:var(--fs-xs);padding:2px 6px;border-radius:8px;background:rgba(255,107,138,.15);border:1px solid rgba(255,107,138,.3);color:#ff6b8a;margin-left:4px}
.sb-pages{min-height:150px}
.sb-page{display:none}
.sb-nav{display:flex;justify-content:flex-start;align-items:stretch;gap:3px;padding:8px 0 0;border-top:1px solid var(--c-border);margin-top:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(255,105,180,.3) transparent}
.sb-nav::-webkit-scrollbar{height:4px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,105,180,.3);border-radius:2px}
.sb-nav button{flex:0 0 auto;min-width:42px;min-height:44px;background:rgba(255,192,203,.12);border:1px solid var(--c-border);color:var(--c-dim);border-radius:12px;padding:6px 4px;cursor:pointer;font-size:var(--fs-xs);transition:all .2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);white-space:nowrap;font-family:var(--font)}
.sb-nav button.active{background:rgba(255,105,180,.25);border-color:var(--c-accent);color:var(--c-accent);font-weight:700;box-shadow:0 2px 8px rgba(255,105,180,.2)}
.sb-nav button:hover{background:rgba(255,192,203,.2);color:var(--c-accent)}
.skill-card{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:12px;padding:8px 10px;margin-bottom:8px}
.skill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.skill-name{font-weight:700;font-size:var(--fs-sm);color:var(--c-accent)}
.skill-tier{font-size:var(--fs-xs);padding:2px 8px;border-radius:8px;font-weight:700}
.skill-tier.tg{background:rgba(255,182,217,.2);color:var(--c-safe)}
.skill-tier.tb{background:rgba(255,192,203,.2);color:var(--c-blue)}
.skill-tier.ty{background:rgba(255,182,217,.2);color:var(--c-warn)}
.skill-tier.to{background:rgba(255,158,196,.2);color:var(--c-orange)}
.skill-tier.tr{background:rgba(255,107,138,.2);color:var(--c-danger)}
.skill-desc{font-size:var(--fs-xs);color:var(--c-dim);margin-bottom:4px}
.skill-foot{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--c-dim);margin-top:2px}
.skill-next{color:var(--c-accent)}
.event-filter{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.filter-btn{min-height:44px;background:rgba(255,192,203,.12);border:1px solid var(--c-border);color:var(--c-dim);border-radius:10px;padding:4px 10px;cursor:pointer;font-size:var(--fs-xs);font-family:var(--font)}
.filter-btn.active{background:rgba(255,105,180,.25);color:var(--c-accent);border-color:var(--c-accent)}
.event-timeline{position:relative;padding-left:12px;border-left:2px solid var(--c-border)}
.event-item{margin-bottom:6px;padding:6px 8px;background:rgba(255,192,203,.1);border-radius:8px;border:1px solid var(--c-border)}
.event-row{display:flex;justify-content:space-between;align-items:center;gap:4px}
.event-type{font-size:var(--fs-xs);font-weight:700;color:var(--c-accent);padding:1px 6px;border-radius:6px;background:rgba(255,192,203,.15)}
.event-time{font-size:var(--fs-xs);color:var(--c-dim)}
.event-desc{font-size:var(--fs-xs);color:var(--c-text);margin-top:3px;line-height:1.4}
.setting-btn{min-height:44px;background:rgba(255,192,203,.12);border:1px solid var(--c-border);color:var(--c-dim);border-radius:12px;padding:8px;cursor:pointer;font-size:var(--fs-sm);transition:all .2s;text-align:center;font-family:var(--font)}
.setting-btn.active{background:rgba(255,105,180,.25);border-color:var(--c-accent);color:var(--c-accent);font-weight:700}
.setting-btn:hover{background:rgba(255,192,203,.2);color:var(--c-accent)}
.switch-label{display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:12px;font-size:var(--fs-sm);color:var(--c-dim);cursor:pointer;min-height:44px}
.switch-label input{margin:0;width:16px;height:16px}
.empty-state{text-align:center;color:var(--c-dim);padding:30px 10px;font-size:var(--fs-md)}
.batch-bar{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:6px 8px;background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:10px;margin-bottom:6px}
.batch-bar .batch-info{font-size:var(--fs-xs);color:var(--c-dim)}
.batch-btn{min-height:36px;background:rgba(255,192,203,.18);border:1px solid var(--c-border);color:var(--c-accent);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:var(--fs-xs);font-family:var(--font)}
.batch-btn:hover{background:rgba(255,105,180,.2)}
.batch-btn.danger{color:var(--c-danger);border-color:rgba(255,107,138,.3)}
.record-item{position:relative}
.record-item .batch-check{position:absolute;top:6px;right:8px;width:16px;height:16px}
.rec-expand-btn{font-size:var(--fs-xs);padding:2px 8px;border-radius:8px;background:rgba(255,192,203,.15);border:1px solid var(--c-border);color:var(--c-accent);cursor:pointer;margin-top:3px}
.rec-expand-btn:hover{background:rgba(255,105,180,.2)}
.rec-detail{display:none;padding:6px 8px;margin-top:4px;background:rgba(255,192,203,.06);border-radius:8px;font-size:var(--fs-xs);line-height:1.5}
.rec-detail.show{display:block}
.event-importance{font-size:var(--fs-xs);padding:1px 6px;border-radius:6px;font-weight:700;margin-left:4px}
.event-importance.high{background:rgba(255,107,138,.2);color:var(--c-danger)}
.event-importance.mid{background:rgba(255,158,196,.2);color:var(--c-warn)}
.event-importance.low{background:rgba(255,182,217,.15);color:var(--c-safe)}
.radar-svg{display:block;margin:6px auto;max-width:200px;width:100%;height:auto}
.radar-svg polygon.data{fill:rgba(255,105,180,.25);stroke:var(--c-accent);stroke-width:1.5;transition:all .4s ease}
.radar-svg circle.dot{fill:var(--c-accent)}
.radar-svg text{fill:var(--c-dim);font-size:9px;text-anchor:middle;dominant-baseline:middle}
.radar-svg line.grid{stroke:rgba(255,182,193,.2);stroke-width:.5}
.task-card{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:12px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--c-accent)}
.task-card.main{border-left-color:var(--c-warn)}
.task-card.side{border-left-color:var(--c-blue)}
.task-card.daily{border-left-color:var(--c-safe)}
.task-card.hidden_t{border-left-color:var(--c-pink)}
.task-type-tag{font-size:var(--fs-xs);padding:1px 6px;border-radius:6px;font-weight:700}
.task-type-tag.main{background:rgba(255,158,196,.2);color:var(--c-warn)}
.task-type-tag.side{background:rgba(255,133,162,.2);color:var(--c-blue)}
.task-type-tag.daily{background:rgba(255,182,217,.2);color:var(--c-safe)}
.task-type-tag.hidden_t{background:rgba(255,20,147,.2);color:var(--c-pink)}
.task-diff-tag{font-size:var(--fs-xs);padding:1px 5px;border-radius:5px;font-weight:700}
.task-diff-tag.d-d{background:rgba(200,200,200,.15);color:#ccc}
.task-diff-tag.d-c{background:rgba(180,200,220,.15);color:#b4c8dc}
.task-diff-tag.d-b{background:rgba(150,180,200,.2);color:#96b4c8}
.task-diff-tag.d-a{background:rgba(255,182,193,.2);color:var(--c-warn)}
.task-diff-tag.d-s{background:rgba(255,158,196,.25);color:var(--c-orange)}
.task-diff-tag.d-ss{background:rgba(255,107,138,.25);color:var(--c-danger)}
.task-status-tag{font-size:var(--fs-xs);padding:1px 6px;border-radius:6px}
.task-status-tag.todo{background:rgba(200,200,200,.15);color:#ccc}
.task-status-tag.doing{background:rgba(133,162,255,.15);color:#85a2ff}
.task-status-tag.done{background:rgba(120,200,130,.2);color:#78c882}
.task-status-tag.failed{background:rgba(255,107,138,.2);color:var(--c-danger)}
.rule-card{background:rgba(255,192,203,.08);border:1px solid var(--c-border);border-radius:12px;padding:8px 10px;margin-bottom:6px}
.rule-card.world{border-left:3px solid var(--c-blue)}
.rule-card.school{border-left:3px solid var(--c-warn)}
.rule-card h4{font-size:var(--fs-sm);color:var(--c-accent);margin-bottom:4px}
.rule-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;font-size:var(--fs-xs);color:var(--c-dim)}
.shop-quality{font-size:var(--fs-xs);padding:1px 5px;border-radius:5px;font-weight:700;margin-left:4px}
.shop-quality.common{background:rgba(200,200,200,.15);color:#ccc}
.shop-quality.fine{background:rgba(120,160,220,.2);color:#78a0dc}
.shop-quality.rare{background:rgba(180,120,220,.2);color:#b478dc}
.shop-quality.epic{background:rgba(255,158,96,.25);color:#ff9e60}
.shop-quality.legend{background:rgba(255,200,80,.25);color:#ffc850}
.shop-stock-tag{font-size:var(--fs-xs);padding:1px 5px;border-radius:5px}
.shop-stock-tag.plenty{background:rgba(120,200,130,.2);color:#78c882}
.shop-stock-tag.tight{background:rgba(255,200,80,.2);color:#ffc850}
.shop-stock-tag.low{background:rgba(255,158,96,.2);color:#ff9e60}
.shop-stock-tag.none{background:rgba(200,200,200,.15);color:#999}
.env-card{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:12px;padding:8px 10px;margin-bottom:6px}
.env-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-top:4px}
.env-item{background:rgba(255,182,193,.1);border-radius:8px;padding:4px 8px;font-size:var(--fs-xs)}
.env-item .k{color:var(--c-dim)}.env-item .v{color:var(--c-accent);font-weight:600}
.radar-signal{display:flex;align-items:center;gap:6px;padding:6px 8px;background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:10px;margin-bottom:4px}
.radar-type{font-size:var(--fs-xs);padding:1px 6px;border-radius:6px;font-weight:700;white-space:nowrap}
.radar-type.machine{background:rgba(255,158,96,.2);color:var(--c-orange)}
.radar-type.person{background:rgba(255,133,162,.2);color:var(--c-blue)}
.radar-type.ship{background:rgba(180,120,220,.2);color:#b478dc}
.radar-type.base{background:rgba(255,182,217,.2);color:var(--c-safe)}
.radar-strength{font-size:var(--fs-xs);padding:1px 5px;border-radius:5px;font-weight:700}
.radar-strength.strong{background:rgba(255,107,138,.2);color:var(--c-danger)}
.radar-strength.medium{background:rgba(255,158,96,.2);color:var(--c-orange)}
.radar-strength.weak{background:rgba(200,200,200,.15);color:#ccc}
.radar-threat{font-size:var(--fs-xs);padding:1px 5px;border-radius:5px}
.radar-threat.harmless{background:rgba(120,200,130,.2);color:#78c882}
.radar-threat.suspicious{background:rgba(255,200,80,.2);color:#ffc850}
.radar-threat.hostile{background:rgba(255,158,96,.2);color:var(--c-orange)}
.radar-threat.extreme{background:rgba(255,107,138,.2);color:var(--c-danger)}
.radar-threat.unknown{background:rgba(200,200,200,.15);color:#999}
.asset-section{margin-bottom:8px}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px}
.asset-card{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:10px;padding:6px 8px}
.asset-card .name{font-weight:600;font-size:var(--fs-sm);color:var(--c-accent)}
.asset-card .qty{font-size:var(--fs-xs);color:var(--c-dim);float:right}
.asset-card .meta{font-size:var(--fs-xs);color:var(--c-dim);margin-top:2px}
.craft-layout{display:flex;gap:8px;flex-wrap:wrap}
.craft-list{flex:1;min-width:200px}
.craft-detail{flex:1;min-width:200px}
.craft-recipe{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:10px;padding:6px 8px;margin-bottom:4px;cursor:pointer}
.craft-recipe.active{border-color:var(--c-accent);background:rgba(255,105,180,.15)}
.craft-search{width:100%;padding:6px 8px;background:rgba(255,192,203,.12);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text);font-size:var(--fs-sm);margin-bottom:6px;font-family:var(--font)}
.craft-search::placeholder{color:var(--c-dim)}
.craft-mat{display:flex;justify-content:space-between;font-size:var(--fs-xs);padding:2px 0}
.craft-mat .ok{color:#78c882}.craft-mat .no{color:var(--c-danger)}
.craft-diff{background:rgba(255,182,193,.08);border-radius:8px;padding:6px;margin:4px 0}
.craft-diff-row{display:flex;justify-content:space-between;font-size:var(--fs-xs);padding:1px 0}
.craft-diff-row .before{color:var(--c-dim);text-decoration:line-through}
.craft-diff-row .after{color:var(--c-safe);font-weight:600}
.craft-flash{animation:craftFlash .6s ease}
@keyframes craftFlash{0%{background:rgba(120,200,130,.3)}100%{background:transparent}}
.vehicle-card,.residence-card{background:rgba(255,192,203,.1);border:1px solid var(--c-border);border-radius:12px;padding:8px 10px;margin-bottom:6px}

.vehicle-status.parked{background:rgba(133,162,255,.15);color:#85a2ff}
.vehicle-status.moving{background:rgba(120,200,130,.2);color:#78c882}
.vehicle-status.repair{background:rgba(255,200,80,.2);color:#ffc850}
.vehicle-status.damaged{background:rgba(255,107,138,.2);color:var(--c-danger)}
.sub-card{background:rgba(255,182,193,.08);border:1px solid rgba(255,182,193,.2);border-radius:8px;padding:5px 8px;margin:4px 0;font-size:var(--fs-xs)}
@media(max-width:480px){.g{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:repeat(2,1fr)}.hd-t{font-size:var(--fs-sm)}.hd-l{width:100%}.sb-nav button{padding:6px 2px;font-size:10px}.skill-card{padding:6px 8px}}
@media(max-width:360px){.g{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.sb-nav button{padding:4px 1px;font-size:9px}}

<script>
var TH_HOSTS=[window,window.parent,window.top].filter(function(w,i,arr){return w&&arr.indexOf(w)===i});
function pickHostValue(name){if(window[name]!==undefined)return window[name];for(var i=0;i<TH_HOSTS.length;i++){try{if(TH_HOSTS[i][name]!==undefined)return TH_HOSTS[i][name]}catch(e){}}return undefined}
function getMvu(){return pickHostValue('Mvu')||window.Mvu||null}
function parseEmbeddedStat(){var el=document.getElementById('mvu-stat-embed');if(!el)return null;var raw=(el.textContent||el.innerText||'').trim();if(!raw||raw.indexOf('format_message_variable')>=0)return null;try{var parsed=JSON.parse(raw);if(parsed&&typeof parsed==='object'){if(parsed.stat_data&&typeof parsed.stat_data==='object')return parsed.stat_data;return parsed}}catch(e){}return null}
function hasData(o){return o&&typeof o==='object'&&!Array.isArray(o)&&Object.keys(o).length>0}
function resolveMessageIdFromDom(){try{var frame=window.frameElement;if(frame&&frame.closest){var mes=frame.closest('.mes');if(mes){var id=parseInt(mes.getAttribute('mesid'),10);if(id>=0)return id}}var el=frame;while(el){if(el.classList&&el.classList.contains('mes')){var id2=parseInt(el.getAttribute('mesid'),10);if(id2>=0)return id2}el=el.parentElement}}catch(e){}return -1}
function resolveMessageIdFromIframeName(){var fn=pickHostValue('getIframeName');if(typeof fn==='function'){try{var name=String(fn()||'');var m=/^TH-message--(\d+)--/.exec(name);if(m)return parseInt(m[1],10)}catch(e){}}return -1}
function resolveMessageId(){var fromDom=resolveMessageIdFromDom();if(fromDom>=0)return fromDom;var fromName=resolveMessageIdFromIframeName();if(fromName>=0)return fromName;if(typeof window.message_id==='number'&&window.message_id>=0)return window.message_id;var fn=pickHostValue('getCurrentMessageId');if(typeof fn==='function'){try{return fn()}catch(e){}}return -1}
function getMessageOption(){var messageId=resolveMessageId();return{type:'message',message_id:messageId>=0?messageId:'latest'}}
function pickStatData(source){if(!source||typeof source!=='object')return null;var stat=source.stat_data;return hasData(stat)?stat:null}
var cachedStatFromBridge=null;
function readStatDataSync(){var embedded=parseEmbeddedStat();if(embedded)return deepMergeStat(DEFAULT_STAT,embedded);if(cachedStatFromBridge&&hasData(cachedStatFromBridge))return deepMergeStat(DEFAULT_STAT,cachedStatFromBridge);return deepMergeStat(DEFAULT_STAT,{})}
async function readStatDataAsync(){try{if(typeof getLastMessageId==='function'){var maxId=getLastMessageId();var Mvu=getMvu();var gv=pickHostValue('getVariables');for(var i=0;i<15;i++){var cid=maxId-i;if(cid<0)break;var msg=null;try{msg=getChatMessages(cid)}catch(e){continue}if(Array.isArray(msg))msg=msg[0];if(!msg||msg.role!=='assistant')continue;var mid=msg.message_id;if(typeof mid!=='number'||mid<0)continue;var v=null;try{if(Mvu&&typeof Mvu.getMvuData==='function'){v=await Mvu.getMvuData({type:'message',message_id:mid})}else if(gv){v=await gv({type:'message',message_id:mid})}}catch(e){}var stat=pickStatData(v);if(stat&&hasData(stat))return deepMergeStat(DEFAULT_STAT,stat)}}}catch(e){}var embedded=parseEmbeddedStat();if(embedded)return deepMergeStat(DEFAULT_STAT,embedded);return deepMergeStat(DEFAULT_STAT,{})}
function requestStatFromBridge(){var mesId=resolveMessageId();var payload={type:'fjb-mvu-stat-request',messageId:mesId};var origin=window.location.origin||'*';for(var i=0;i<TH_HOSTS.length;i++){try{TH_HOSTS[i].postMessage(payload,origin)}catch(e){}}}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function num(v,d){v=parseFloat(v);d=(d===undefined)?0:d;return isNaN(v)?d:v}
function pct(v,max){v=num(v,0);max=num(max,100);return Math.max(0,Math.min(100,max>0?(v/max)*100:0))}
function barClass4(v){v=parseInt(v)||0;if(v>=80)return'g';if(v>=60)return'y';if(v>=30)return'o';return'r'}
function barClass5(v){v=parseInt(v)||0;if(v>=80)return'g';if(v>=60)return'b';if(v>=40)return'y';if(v>=20)return'o';return'r'}
function kv(k,v,cls){return '<div class="kv"><span class="k">'+k+'</span><span class="v'+(cls?' '+cls:'')+'">'+esc(v)+'</span></div>'}
function bar(label,val,max,cls){max=max||100;var v=num(val,0);cls=cls||barClass4;return '<div class="bar"><div class="bar-h"><span>'+label+'</span><span class="bv">'+v+'/'+max+'</span></div><div class="bar-t"><div class="bar-f '+cls(v)+'" style="width:'+pct(v,max)+'%"></div></div></div>'}

var DEFAULT_STAT={basic:{name:"玩家",gender:"男",age:18,school:"私立星月女子学院",grade_class:"高三2班"},time:{day:1,hour:8,weekday:"周一",date_str:"09-01 周一",semester_day:1},stats:{energy:80,energy_max:80,sanity:80,health:75,stress:10,suspicion:0,corruption:0,money:500,difficulty:"困难",stamina:80},skills:{meditation:{level:2,exp:0,daily_used:0,daily_max:50},exercise:{level:1,exp:0,daily_used:0,daily_max:40},insight:{level:1,exp:0,daily_used:0,daily_max:40},disguise:{level:1,exp:0,daily_used:0,daily_max:30},recovery:{level:1,exp:0,daily_used:0,daily_max:30},willpower:{level:1,exp:0,daily_used:0,daily_max:30}},use_stage:{current:1,total_uses:0,today_uses:0,last_use_day:0,stage_progress:0},academic:{score:75,stage:3,study_count_today:0,exam_countdown:126,teacher_attention:0},_symptoms:{fatigue_desc:"暂无异常",sensitivity_desc:"暂无异常",appearance_desc:"气色正常",sanity_desc:"情绪稳定"},_check_suggestions:[],tasks:[],rule_changes:{world_changes:[],school_changes:[]}};

function deepMergeStat(dst,src){if(!src||typeof src!=='object')return dst;var out={};try{out=JSON.parse(JSON.stringify(dst||{}))}catch(e){out={}}for(var k in src){if(!Object.prototype.hasOwnProperty.call(src,k))continue;var sv=src[k],dv=out[k];if(sv&&typeof sv==='object'&&!Array.isArray(sv)&&dv&&typeof dv==='object'&&!Array.isArray(dv)){out[k]=deepMergeStat(dv,sv)}else{out[k]=sv}}return out}
function mvuObj(key,sub){var o=DEFAULT_STAT;try{o=State.mvu||DEFAULT_STAT}catch(e){}if(!o||typeof o!=='object')o=DEFAULT_STAT;var v=o[key];if(v&&typeof v==='object'&&sub!==undefined)v=v[sub];return v||{}}
var State={loading:true,refreshing:false,mvu:{},expanded:{}};
var currentPage='status';
var currentTheme='pink';
var currentEventFilter='all';
var currentRadarFilter='all';
var craftSearchText='';
var THEMES={pink:{'--c-accent':'#ff69b4','--c-pink':'#ff1493','--c-danger':'#ff6b8a','--c-warn':'#ff9ec4','--c-orange':'#ff85a2','--c-safe':'#ffb6d9','--c-blue':'#ff85a2','--c-silver':'#ffc0cb'},purple:{'--c-accent':'#9b59b6','--c-pink':'#8e44ad','--c-danger':'#9b59b6','--c-warn':'#b388d1','--c-orange':'#a569bd','--c-safe':'#c39bd3','--c-blue':'#a569bd','--c-silver':'#d2b4de'},dark:{'--c-accent':'#e74c3c','--c-pink':'#c0392b','--c-danger':'#e74c3c','--c-warn':'#f39c12','--c-orange':'#e67e22','--c-safe':'#2ecc71','--c-blue':'#3498db','--c-silver':'#95a5a6'}};
function cardTitle(cls,icon,text,key){var open=State.expanded[key]?' open':'';return '<details class="block"'+open+' data-key="'+key+'"><summary class="card-t '+cls+'">'+icon+' '+text+'<span class="caret">▶</span></summary><div class="block-body">'}

function renderHeader(){var t=mvuObj('time'),s=mvuObj('stats'),us=mvuObj('use_stage'),ac=mvuObj('academic'),sy=mvuObj('_symptoms');var diff=s.difficulty||'困难';var diffCls=diff==='地狱'?'danger':(diff==='困难'?'warn':'safe');var sus=s.suspicion||0;var cor=s.corruption||0;var susCls=sus>=150?'danger':(sus>=70?'warn':'silver');var corCls=cor>=120?'danger':(cor>=60?'warn':'silver');var _h=Number(t.hour)||8;var _slot;if(_h>=5&&_h<7)_slot='早晨';else if(_h>=7&&_h<8)_slot='晨读';else if(_h>=8&&_h<12)_slot='上午';else if(_h>=12&&_h<14)_slot='中午';else if(_h>=14&&_h<17)_slot='下午';else if(_h>=17&&_h<19)_slot='傍晚';else if(_h>=19&&_h<22)_slot='晚自习';else if(_h>=22||_h<2)_slot='夜里';else _slot='半夜';return '<div class="hd"><div class="hd-l"><span class="hd-t">✦ 星月女子学院</span><span class="pill">Day '+esc(t.day||1)+'</span><span class="pill">'+esc(t.date_str||'')+' '+esc(t.weekday||'')+'</span><span class="pill safe">'+esc(_slot)+' '+esc(t.hour||8)+':00</span><span class="pill '+diffCls+'">'+esc(diff)+'</span><span class="pill '+susCls+'">🔍 '+esc(sus)+'/200</span><span class="pill '+corCls+'">🌑 '+esc(cor)+'/200</span><span class="pill warn">💰 '+esc(s.money||0)+'元</span><span class="pill warn">📚 距高考 '+esc(ac.exam_countdown||126)+'天</span><span class="hd-sub">学业 '+esc(ac.score||75)+' ('+esc(ac.stage||3)+'/5) · 使用阶段 '+esc(us.current||1)+'/5</span></div><button class="rfr'+(State.refreshing?' spinning':'')+'" data-act="refresh">✦</button></div>'+bar('精力 '+esc(s.energy||0)+'/'+esc(s.energy_max||80),s.energy||0,s.energy_max||80,barClass4)+bar('理智',s.sanity||0,100,barClass5)+bar('疑心',s.suspicion||0,200,barClass4)+bar('沉沦',s.corruption||0,200,barClass4)+bar('体力',s.stamina||0,100,barClass4)+'<div class="g" style="margin-top:4px">'+kv('健康',s.health||0)+(s.stress>50?'<span class="v warn">压力:'+esc(s.stress)+'</span>':'<span>压力:'+esc(s.stress)+'</span>')+kv('距高考',(ac.exam_countdown||126)+'天','warn')+'</div>'+'<div style="font-size:var(--fs-xs);color:var(--c-dim);margin-top:4px">'+esc(sy.fatigue_desc||'')+' · '+esc(sy.sanity_desc||'')+'</div>'}

function renderSymptoms(){var sy=mvuObj('_symptoms');return cardTitle('symptom','📋','当前症状','symptom')+'<div class="g2">'+kv('身体感受',sy.fatigue_desc||'暂无')+kv('异常感知',sy.sensitivity_desc||'暂无')+kv('外人看来',sy.appearance_desc||'正常')+kv('心理状态',sy.sanity_desc||'稳定')+'</div></div></details>'}

function renderCheckSuggestions(){var cs=mvuObj('_check_suggestions');if(!Array.isArray(cs)||cs.length===0)return '';var body='';cs.forEach(function(item,idx){if(!item||!item.display_text)return;body+='<div class="heroine-item" style="cursor:default"><div class="heroine-row"><span class="heroine-name" style="color:var(--c-silver)">'+(idx+1)+'. '+esc(item.display_text)+'</span></div>';if(item.dice_command){body+='<div class="heroine-stats"><span>指令: '+esc(item.dice_command)+'</span></div>'}body+='</div>'});if(!body)return '';return cardTitle('event','🎲','检定建议 ('+cs.length+')','checkSuggestions')+body+'</div></details>'}

function skillTier(lv){lv=parseInt(lv)||1;if(lv>=81)return '大师';if(lv>=61)return '高级';if(lv>=41)return '中级';if(lv>=21)return '初级';return '入门'}
function skillTierCls(lv){lv=parseInt(lv)||1;if(lv>=81)return 'tg';if(lv>=61)return 'tb';if(lv>=41)return 'ty';if(lv>=21)return 'to';return 'tr'}
function skillBarCls(lv){lv=parseInt(lv)||1;if(lv>=81)return 'g';if(lv>=61)return 'b';if(lv>=41)return 'y';if(lv>=21)return 'o';return 'r'}
function nextTierInfo(lv){lv=parseInt(lv)||1;if(lv>=81)return '已满级';if(lv>=61)return '→ 大师 (Lv.81+)';if(lv>=41)return '→ 高级 (Lv.61+)';if(lv>=21)return '→ 中级 (Lv.41+)';return '→ 初级 (Lv.21+)'}

function renderPageStatus(){return renderHeader()+renderRadarSVG()+renderSymptoms()+renderCheckSuggestions()}

function renderPageCharacters(){var fu=mvuObj('female_users');var keys=Object.keys(fu).filter(function(k){return k&&fu[k]&&fu[k].basic&&fu[k].basic.name});var body='';if(keys.length===0){body='<div class="empty-state">暂无女性数据</div>'}else{for(var i=0;i<keys.length;i++){var h=fu[keys[i]];if(!h||!h.basic)continue;var name=h.basic.name||'--';var role=h.basic.role||'--';var fav=h.with_player?h.with_player.favorability||0:0;var stage=h.stage_trajectory?h.stage_trajectory.current_stage||1:1;var bodyT=h.body?h.body.body_type||'':'';var cup=h.body?h.body.breast_cup||'':'';body+='<div class="heroine-item" data-act="heroine-detail" data-key="'+esc(keys[i])+'"><div class="heroine-row"><span class="heroine-name">'+esc(name)+'</span><span class="heroine-role">'+esc(role)+'</span></div><div class="heroine-stats"><span>好感:'+fav+'</span><span>阶段:'+stage+'/10</span><span>'+esc(bodyT)+' '+esc(cup)+'</span></div></div>'}}return body}

function renderPageSkills(){var sk=mvuObj('skills');var defs=[{key:'meditation',name:'冥想',desc:'恢复理智，缓解精神压力'},{key:'exercise',name:'锻炼',desc:'提升体力，增强体魄'},{key:'insight',name:'洞察',desc:'观察细节，发现隐藏信息'},{key:'disguise',name:'伪装',desc:'隐藏真实想法与状态'},{key:'recovery',name:'恢复',desc:'快速恢复精力与体力'},{key:'willpower',name:'意志',desc:'抵抗精神侵蚀与诱惑'}];var body='';defs.forEach(function(d){var s=sk[d.key]||{};var lv=parseInt(s.level)||1;var ex=parseInt(s.exp)||0;var dm=parseInt(s.daily_max)||15;var du=parseInt(s.daily_used)||0;var expMax=100*(lv+1);var tier=skillTier(lv);var tierCls=skillTierCls(lv);var barCls=skillBarCls(lv);var nextT=nextTierInfo(lv);body+='<div class="skill-card"><div class="skill-head"><span class="skill-name">'+d.name+'</span><span class="skill-tier '+tierCls+'">'+tier+'</span></div><div class="skill-desc">'+d.desc+'</div><div class="bar-h"><span>Lv.'+lv+'</span><span class="bv">EXP '+ex+'/'+expMax+'</span></div><div class="bar-t"><div class="bar-f '+barCls+'" style="width:'+pct(ex,expMax)+'%"></div></div><div class="skill-foot"><span>今日 '+du+'/'+dm+'</span><span class="skill-next">'+nextT+'</span></div></div>'});return body}

var EVENT_DISPLAY_LIMIT=20;
function eventImportanceTag(imp){imp=Number(imp)||0;var cls,txt;if(imp>=80){cls='high';txt='★重要'}else if(imp>=50){cls='mid';txt='◆中等'}else{cls='low';txt='·一般'}return '<span class="event-importance '+cls+'">'+txt+'</span>'}
function eventIdSortValue(id){id=String(id||'');var m=/(\d+)/.exec(id);return m?parseInt(m[1],10):0}
function renderPageEvents(){var hidden=mvuObj('_hidden');var events=hidden.recent_events||[];if(!Array.isArray(events)||events.length===0){return '<div class="empty-state">暂无事件记录</div>'}var typeNames={use:'使用',symptom:'症状',investigate:'调查',social:'社交',exam:'考试',ending:'结局'};
// 按 event id 数值降序排序
var sorted=events.slice().sort(function(a,b){return eventIdSortValue(b.id)-eventIdSortValue(a.id)});
// 类型筛选
var filtered=sorted.filter(function(ev){if(currentEventFilter==='all')return true;return (ev.type||'unknown')===currentEventFilter});
// 显示数量限制
var limited=filtered.slice(0,EVENT_DISPLAY_LIMIT);
var body='<div class="event-filter">';body+='<button class="filter-btn '+('all'===currentEventFilter?'active':'')+'" data-act="filter-event" data-val="all">全部</button>';Object.keys(typeNames).forEach(function(t){body+='<button class="filter-btn '+(t===currentEventFilter?'active':'')+'" data-act="filter-event" data-val="'+t+'">'+typeNames[t]+'</button>'});body+='</div>';
if(filtered.length>EVENT_DISPLAY_LIMIT){body+='<div class="batch-bar"><span class="batch-info">显示最近 '+EVENT_DISPLAY_LIMIT+' 条 / 共 '+filtered.length+' 条</span></div>'}

root.addEventListener('change',function(e){var t=e.target;if(!t)return;if(t.getAttribute('data-act')==='toggle-fn'){var sw=t.getAttribute('data-val');ccSwitchState[sw]=t.checked;notifyCC('fjb-cc-set-switch',{key:sw,value:t.checked})}else if(t.getAttribute('data-act')==='batch-check'){var cat=t.getAttribute('data-cat');var id=t.getAttribute('data-id');if(!batchSelected[cat])batchSelected[cat]={};batchSelected[cat][id]=t.checked;var bar=document.querySelector('.batch-bar .batch-info');if(bar){var count=Object.keys(batchSelected[cat]).filter(function(k){return batchSelected[cat][k]}).length;bar.textContent='已选 '+count+' 条'}}});root.addEventListener('click',function(e){var item=e.target.closest('.shop-item.buyable');if(!item)return;var itemId=item.getAttribute('data-item');var price=Number(item.getAttribute('data-price'))||0;var itemName=item.getAttribute('data-name')||item.querySelector('.heroine-name').textContent;var input=document.querySelector('#send_textarea textarea')||document.querySelector('textarea');if(input){input.value='购买'+itemName+'（'+price+'元）';input.dispatchEvent(new Event('input',{bubbles:true}));input.focus()}});document.getElementById('modal-overlay').addEventListener('click',function(e){var t=e.target.closest('[data-act]');if(t&&t.getAttribute('data-act')==='close-modal'){closeModal()}})}

async function refresh(){if(State._refreshing)return;State._refreshing=true;State.refreshing=true;var quickStat=readStatDataSync();if(hasData(quickStat)){State.mvu=quickStat;State.loading=false}render();try{var realStat=await readStatDataAsync();if(hasData(realStat)){State.mvu=realStat;State.loading=false}}catch(e){}State._refreshing=false;State.refreshing=false;render();requestStatFromBridge()}

(function init(){bindEvents();var autoRefresh=function(){setTimeout(refresh,800)};var hostEventOn=pickHostValue('eventOn');try{if(typeof hostEventOn==='function'){hostEventOn('GENERATION_ENDED',autoRefresh);hostEventOn('MESSAGE_EDITED',autoRefresh);hostEventOn('mag_variable_update_ended',autoRefresh)}}catch(e){}window.addEventListener('message',function(e){try{if(e.origin&&e.origin!==window.location.origin)return;var data=e.data;if(data&&data.type==='fjb-mvu-stat-data'&&data.stat_data){var mesId=resolveMessageId();if(mesId>=0&&typeof data.messageId==='number'&&data.messageId>=0&&data.messageId!==mesId)return;if(hasData(data.stat_data)){cachedStatFromBridge=data.stat_data;State.mvu=deepMergeStat(DEFAULT_STAT,data.stat_data);State.loading=false;render()}return}if(data&&data.type==='fjb-set-theme'&&data.theme){currentTheme=data.theme;var root=document.documentElement;var t=THEMES[currentTheme]||THEMES.pink;for(var k in t){if(Object.prototype.hasOwnProperty.call(t,k))root.style.setProperty(k,t[k])}render();return}if(data&&data.type==='fjb-cc-state'&&data.state){if(data.state.switches)ccSwitchState=data.state.switches;if(data.state.theme){currentTheme=data.state.theme;var root2=document.documentElement;var t2=THEMES[currentTheme]||THEMES.pink;for(var k2 in t2){if(Object.prototype.hasOwnProperty.call(t2,k2))root2.style.setProperty(k2,t2[k2])}}render();return}}catch(x){}});var embedded=parseEmbeddedStat();if(embedded)cachedStatFromBridge=embedded;requestStatFromBridge();requestCCState();refresh()})();
</script>
